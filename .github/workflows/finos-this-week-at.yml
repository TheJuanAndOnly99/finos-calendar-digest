name: FINOS This Week At (monthly digest)

on:
  workflow_dispatch:
    inputs:
      range:
        description: Previous, current, and next NYC week (Pages default) or a specific calendar month.
        required: true
        default: rolling-weeks
        type: choice
        options:
          - rolling-weeks
          - custom-month
      month:
        description: Required when range is custom-month (YYYY-MM). Weeks render Mon–Sun; boundary weeks include spillover days from adjacent months.
        required: false
        type: string
      format:
        description: Markdown (default, with links) or plain text
        required: false
        default: markdown
        type: choice
        options:
          - markdown
          - plain
  schedule:
    - cron: "0 12 * * *"

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore current-week cache
        id: restore-week-cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/current-week-meetings.json
          key: finos-current-week-cache-${{ github.run_id }}
          restore-keys: |
            finos-current-week-cache-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Generate digest
        shell: bash
        env:
          OUTPUT: ${{ github.workspace }}/output/finos-this-month.md
          OUTPUT_HTML: ${{ github.workspace }}/output/finos-this-month.html
          WEEK_CACHE_PATH: ${{ github.workspace }}/.cache/current-week-meetings.json
          DISPATCH_RANGE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.range || 'rolling-weeks' }}
          DISPATCH_MONTH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.month || '' }}
          DISPATCH_FORMAT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.format || 'markdown' }}
        run: |
          set -e
          ARGS=()
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${DISPATCH_RANGE}" = "custom-month" ]; then
              if [ -z "${DISPATCH_MONTH}" ]; then
                echo "month is required when range is custom-month"
                exit 1
              fi
              if ! [[ "${DISPATCH_MONTH}" =~ ^[0-9]{4}-[0-9]{2}$ ]]; then
                echo "month must be YYYY-MM"
                exit 1
              fi
              ARGS+=(--month "${DISPATCH_MONTH}")
            fi
            if [ "${DISPATCH_FORMAT}" = "plain" ]; then
              export FORMAT=plain
            fi
          fi
          mkdir -p output
          node scripts/finos-weekly-calendar.mjs "${ARGS[@]}"

      - name: Save current-week cache
        uses: actions/cache/save@v4
        with:
          path: .cache/current-week-meetings.json
          key: finos-current-week-cache-${{ github.run_id }}

      - name: Prepare GitHub Pages file
        shell: bash
        run: |
          mkdir -p output/pages
          cp output/finos-this-month.html output/pages/index.html
          touch output/pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/pages

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: finos-this-month
          path: |
            output/finos-this-month.md
            output/finos-this-month.html
          if-no-files-found: error
          retention-days: 90

  deploy-pages:
    needs: digest
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
